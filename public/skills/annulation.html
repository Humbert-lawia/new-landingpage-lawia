<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paiement annulé — LawIA</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="/favicon.png">
<style>
:root {
  --bleu: #6A9BCC;
  --bleu-f: #4A7BA8;
  --bleu-p: #D3E5F8;
  --dark: #141413;
  --creme: #FAF9F5;
  --gris: #B0AEA5;
  --gris-c: #E8E6DC;
  --negatif: #C4745B;
  --r: 12px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{font-size:16px;}
body{font-family:Calibri,'Gill Sans',sans-serif;background:var(--creme);color:var(--dark);line-height:1.75;min-height:100vh;display:flex;flex-direction:column;}
h1{font-family:Georgia,serif;font-weight:700;}
.container{max-width:700px;margin:0 auto;padding:0 2rem;}
a{color:var(--bleu-f);text-decoration:none;font-weight:600;}
a:hover{color:var(--dark);}

nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0.7rem 0;background:var(--creme);border-bottom:3px solid var(--dark);}
nav .nav-inner{max-width:1100px;margin:0 auto;padding:0 2rem;display:flex;justify-content:space-between;align-items:center;}
.logo{display:flex;align-items:center;gap:0.5rem;font-family:Georgia,serif;font-size:1.5rem;font-weight:700;color:var(--dark);text-decoration:none;}
.logo-img{height:32px;width:auto;}
.logo span{color:var(--bleu);}

.main{flex:1;display:flex;align-items:center;justify-content:center;padding:4rem 0;}
.card{background:#fff;border:3px solid var(--dark);border-radius:var(--r);padding:2.5rem;box-shadow:8px 8px 0 0 var(--gris-c);text-align:center;width:100%;}
.card h1{font-size:1.8rem;margin-bottom:0.8rem;}
.card p{color:var(--gris);margin-bottom:1.5rem;max-width:440px;margin-left:auto;margin-right:auto;}
.btn{display:inline-flex;align-items:center;gap:0.5rem;padding:0.8rem 1.6rem;border-radius:4px;font-family:Calibri,sans-serif;font-size:0.95rem;font-weight:700;text-decoration:none;border:3px solid var(--dark);cursor:pointer;transition:all 0.2s;}
.btn-primary{background:var(--dark);color:var(--creme);}
.btn-primary:hover{transform:translate(-2px,-2px);box-shadow:8px 8px 0 0 var(--bleu-f);color:var(--creme);}
.btn-outline{background:var(--creme);color:var(--dark);margin-left:0.5rem;}
.btn-outline:hover{background:var(--bleu-p);}
.help{font-size:0.85rem;color:var(--gris);margin-top:2rem;}

footer{background:var(--dark);padding:1.5rem 0;text-align:center;border-top:2px solid #2a2a28;font-size:0.8rem;color:var(--gris);}
footer a{color:var(--bleu-c);text-decoration:none;}

@media(max-width:600px){
  .card{padding:1.5rem;}
  .card h1{font-size:1.4rem;}
  .btn-outline{margin-left:0;margin-top:0.5rem;}
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/" class="logo"><img src="/logo lawia.png" alt="LAWIA" class="logo-img"> Law<span>IA</span></a>
    <a href="/" style="font-size:0.9rem;">← Retour au site</a>
  </div>
</nav>

<div class="main">
  <div class="container">
    <div class="card">
      <h1>Paiement annulé</h1>
      <p>Votre paiement n'a pas été effectué. Aucun montant n'a été débité. Vous pouvez réessayer à tout moment.</p>
      <div>
        <a href="tarifs.html" class="btn btn-primary">Voir les tarifs →</a>
        <a href="/" class="btn btn-outline">Retour à l'accueil</a>
      </div>
      <div class="help">
        Une question ? <a href="mailto:contact@lawia.fr">contact@lawia.fr</a>
      </div>
    </div>
  </div>
</div>

<footer>
  <div class="container">
    LawIA SAS — SIREN 990 961 120 — <a href="mailto:contact@lawia.fr">contact@lawia.fr</a>
  </div>
</footer>

</body>
</html>
